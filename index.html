<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoRush - Bike Game</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family: 'Arial Black', Arial, sans-serif;
}
canvas { display:block; box-shadow:0 0 50px #f0c04033, 0 0 100px #ff452011; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════
//  AUDIO
// ═══════════════════════════════════
var AC=null,engNode=null,engGain=null,engOn=false;
function initAudio(){
  if(AC)return;
  try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;}
}
function startEngine(){
  if(!AC||engOn)return; engOn=true;
  engGain=AC.createGain(); engGain.gain.value=0; engGain.connect(AC.destination);
  engNode=AC.createOscillator(); engNode.type='sawtooth'; engNode.frequency.value=55;
  var dist=AC.createWaveShaper(),cv=new Float32Array(256);
  for(var i=0;i<256;i++){var x=i*2/256-1;cv[i]=(Math.PI+300)*x/(Math.PI+300*Math.abs(x));}
  dist.curve=cv;
  var lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;
  engNode.connect(dist);dist.connect(lp);lp.connect(engGain);engNode.start();
  engGain.gain.setTargetAtTime(0.16,AC.currentTime,0.3);
}
function stopEngine(){
  if(!AC||!engOn)return;
  engGain.gain.setTargetAtTime(0,AC.currentTime,0.2);engOn=false;
  setTimeout(function(){try{engNode.stop();}catch(e){}engNode=null;},600);
}
function revEngine(s){
  if(!engNode)return;
  engNode.frequency.setTargetAtTime(45+s*8,AC.currentTime,0.1);
  if(engGain)engGain.gain.setTargetAtTime(0.16,AC.currentTime,0.05);
}
function snd_jump(){
  if(!AC)return;
  var o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';o.frequency.setValueAtTime(220,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(80,AC.currentTime+0.22);
  g.gain.setValueAtTime(0.22,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.22);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.22);
}
function snd_coin(){
  if(!AC)return;
  [880,1100,1320].forEach(function(f,i){
    var o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime+i*0.07;
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.15);
  });
}
function snd_crash(){
  if(!AC)return;
  var sz=AC.sampleRate*0.45,buf=AC.createBuffer(1,sz,AC.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<sz;i++)d[i]=Math.random()*2-1;
  var src=AC.createBufferSource();src.buffer=buf;
  var lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;
  var g=AC.createGain();g.gain.setValueAtTime(0.6,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.45);
  src.connect(lp);lp.connect(g);g.connect(AC.destination);src.start();src.stop(AC.currentTime+0.45);
  var o=AC.createOscillator(),og=AC.createGain();
  o.type='sine';o.frequency.value=55;
  og.gain.setValueAtTime(0.5,AC.currentTime);og.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);
  o.connect(og);og.connect(AC.destination);o.start();o.stop(AC.currentTime+0.3);
}
function snd_land(){
  if(!AC)return;
  var o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';o.frequency.value=90;o.frequency.exponentialRampToValueAtTime(35,AC.currentTime+0.12);
  g.gain.setValueAtTime(0.18,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.12);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.12);
}
function snd_zone(){
  if(!AC)return;
  // Zone transition fanfare
  [440,550,660,880].forEach(function(f,i){
    var o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime+i*0.12;
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.2);
  });
}

// ═══════════════════════════════════
//  CANVAS
// ═══════════════════════════════════
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var CW=640,CH=420;
canvas.width=CW;canvas.height=CH;
function resize(){
  var s=Math.min(window.innerWidth/CW,window.innerHeight/CH)*0.97;
  canvas.style.width=(CW*s)+'px';canvas.style.height=(CH*s)+'px';
}
resize();window.addEventListener('resize',resize);

// ═══════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════
var LANES=[110,320,530];
var GY=315;       // ground Y (bike feet)
var HY=245;       // horizon Y
var ZONE_SWITCH=1200; // score to switch to desert

// ═══════════════════════════════════
//  STARS
// ═══════════════════════════════════
var STARS=[];
for(var _i=0;_i<90;_i++)
  STARS.push({x:Math.random()*CW,y:Math.random()*HY*0.9,r:Math.random()*1.8+0.3,tw:Math.random()*6.28});

// ═══════════════════════════════════
//  BUILDINGS (city skyline)
// ═══════════════════════════════════
var BLDS=[];
for(var _i=0;_i<20;_i++)
  BLDS.push({x:_i*38+Math.random()*12,w:26+Math.random()*28,h:38+Math.random()*90,wc:Math.floor(Math.random()*5)+2,col:['#0d1a2e','#0a1520','#111828','#0e1f30'][Math.floor(Math.random()*4)]});

// Desert cacti/dunes data
var CACTI=[];
for(var _i=0;_i<12;_i++)
  CACTI.push({x:_i*60+Math.random()*30,h:20+Math.random()*40,type:Math.random()>0.5?'cactus':'rock'});

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
var STATE='MENU',mode='endless';
// STATE flow: MENU → SELECT_MODE → SELECT_VEHICLE → PLAYING → DEAD
var vehicle='bike'; // 'bike' or 'car'
var score=0,speed=5,frameN=0,timeLeft=30,roadX=0;
var zone=0; // 0=city night, 1=sahara desert
var zoneAlpha=0; // transition blend 0→1
var zoneMsg='',zoneMsgTimer=0;

var hs={
  endless:parseInt(localStorage.getItem('mr2_e')||'0'),
  timer:parseInt(localStorage.getItem('mr2_t')||'0')
};
var newRec=false;

var bikeLane=1,bkTL=1;
var bkX=LANES[1],bkY=GY,bkVY=0,bkGnd=true,wasGnd=true,bkRot=0;

var obstacles=[],coins=[],particles=[];

// ═══════════════════════════════════
//  INPUT
// ═══════════════════════════════════
document.addEventListener('keydown',function(e){
  initAudio();
  if(STATE==='PLAYING'){
    if((e.key===' '||e.key==='ArrowUp')&&bkGnd&&vehicle!=='car')doJump();
    if((e.key==='ArrowLeft'||e.key==='a')&&bkTL>0)bkTL--;
    if((e.key==='ArrowRight'||e.key==='d')&&bkTL<2)bkTL++;
  }
  e.preventDefault();
});
canvas.addEventListener('click',function(e){
  initAudio();
  var r=canvas.getBoundingClientRect();
  var sx=(e.clientX-r.left)*(CW/r.width),sy=(e.clientY-r.top)*(CH/r.height);

  if(STATE==='MENU'){
    // Play button — go to mode select
    if(sx>220&&sx<420&&sy>285&&sy<345){STATE='SELECT_MODE';return;}
    // Reset HS
    if(sx>230&&sx<410&&sy>358&&sy<388){resetHS();return;}
  }

  if(STATE==='SELECT_MODE'){
    // Endless card  x=60 y=275 w=220 h=70
    if(sx>60&&sx<280&&sy>275&&sy<345){mode='endless';STATE='SELECT_VEHICLE';return;}
    // Timer card    x=360 y=275 w=220 h=70
    if(sx>360&&sx<580&&sy>275&&sy<345){mode='timer';STATE='SELECT_VEHICLE';return;}
    // Back
    if(sx>10&&sx<90&&sy>10&&sy<40){STATE='MENU';return;}
  }

  if(STATE==='SELECT_VEHICLE'){
    // Bike card  x=18 w=182
    if(sx>18&&sx<200&&sy>92&&sy<382){vehicle='bike';startGame(mode);return;}
    // Sport bike x=228 w=182
    if(sx>228&&sx<410&&sy>92&&sy<382){vehicle='sportbike';startGame(mode);return;}
    // Car card   x=438 w=182
    if(sx>438&&sx<620&&sy>92&&sy<382){vehicle='car';startGame(mode);return;}
    // Back
    if(sx>10&&sx<90&&sy>10&&sy<40){STATE='SELECT_MODE';return;}
  }

  if(STATE==='PLAYING'){
    if(sy<CH*0.55){if(bkGnd&&vehicle!=='car')doJump();}
    else if(sx<CW/2){if(bkTL>0)bkTL--;}
    else{if(bkTL<2)bkTL++;}
  }
  if(STATE==='DEAD'){
    if(sx>120&&sx<280&&sy>308&&sy<362){startGame(mode);return;}
    if(sx>360&&sx<520&&sy>308&&sy<362){STATE='MENU';stopEngine();return;}
  }
});
function doJump(){
  bkVY=-13.5;bkGnd=false;snd_jump();
  spawnParts(bkX,bkY+35,'#aaaaaa',5);
  if(engGain)engGain.gain.setTargetAtTime(0.07,AC.currentTime,0.05);
}

// ═══════════════════════════════════
//  GAME CONTROL
// ═══════════════════════════════════
function startGame(m){
  mode=m;STATE='PLAYING';newRec=false;
  score=0;speed=5;frameN=0;timeLeft=30;roadX=0;
  zone=0;zoneAlpha=0;zoneMsg='';zoneMsgTimer=0;
  bikeLane=1;bkTL=1;
  bkX=LANES[1];bkY=GY;bkVY=0;bkGnd=true;wasGnd=true;bkRot=0;
  obstacles=[];coins=[];particles=[];
  startEngine();
}
function endGame(){
  newRec=score>0&&score>hs[mode];
  if(newRec){hs[mode]=score;localStorage.setItem(mode==='endless'?'mr2_e':'mr2_t',score);}
  STATE='DEAD';snd_crash();stopEngine();
}
function resetHS(){
  hs={endless:0,timer:0};
  localStorage.removeItem('mr2_e');localStorage.removeItem('mr2_t');
}

// ═══════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════
function spawnParts(x,y,col,n){
  for(var i=0;i<n;i++)
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*7,vy:-Math.random()*6-1,
      life:40,ml:40,r:2+Math.random()*4,col:col});
}

// ═══════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════
var lastT=0;
function loop(ts){
  var dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════
//  UPDATE
// ═══════════════════════════════════
function update(dt){
  if(STATE!=='PLAYING')return;
  frameN++;speed=(vehicle==='sportbike'?6:5)+frameN*(vehicle==='sportbike'?0.006:0.004);score+=Math.floor(speed*0.4);
  roadX-=speed*dt;if(roadX<-60)roadX+=60;
  revEngine(speed);

  // Zone transition
  var targetZone=score>=ZONE_SWITCH?1:0;
  if(targetZone!==zone&&zoneAlpha<=0){
    zone=targetZone;zoneAlpha=1;
    zoneMsg=zone===1?'ENTERING SAHARA DESERT':'BACK TO CITY';
    zoneMsgTimer=150;
    snd_zone();
  }
  if(zoneAlpha>0)zoneAlpha=Math.max(0,zoneAlpha-0.02);
  if(zoneMsgTimer>0)zoneMsgTimer--;

  // Timer mode
  if(mode==='timer'){timeLeft-=dt/60;if(timeLeft<=0){timeLeft=0;endGame();return;}}

  // Smooth lane
  var tx=LANES[bkTL];
  bkX+=(tx-bkX)*0.18*dt;
  if(Math.abs(bkX-tx)<1){bkX=tx;bikeLane=bkTL;}

  // Gravity
  wasGnd=bkGnd;
  if(!bkGnd){
    bkVY+=0.65*dt;bkY+=bkVY*dt;
    if(bkY>=GY){bkY=GY;bkVY=0;bkGnd=true;if(!wasGnd)snd_land();}
  }
  bkRot+=speed*0.12;

  // Scroll bg elements
  BLDS.forEach(function(b){b.x-=speed*0.15*dt;if(b.x<-60)b.x=CW+Math.random()*40;});
  CACTI.forEach(function(c){c.x-=speed*0.2*dt;if(c.x<-60)c.x=CW+Math.random()*60;});

  // ── SPAWN OBSTACLES ──
  // Only cars and enemy bikes — NO rocks/cones/barrels
  var spI=Math.max(52,115-Math.floor(speed*4));
  if(frameN%spI===0){
    var lns=shuffArr([0,1,2]);
    // City = cones, Desert = rocks
    var t=zone===1?'rock':'cone';
    obstacles.push({lane:lns[0],x:CW+70,y:GY+8,type:t,w:34,h:38,animF:0});
  }

  // ── SPAWN COINS — ALWAYS IN AIR, never at ground ──
  if(frameN%80===0){
    var safe=[];
    for(var ln=0;ln<3;ln++){
      var blk=false;
      for(var oi=0;oi<obstacles.length;oi++){
        var ob=obstacles[oi];
        if(ob.lane===ln&&ob.x>CW-80&&ob.x<CW+340){blk=true;break;}
      }
      if(!blk)safe.push(ln);
    }
    if(safe.length>0){
      var cl=safe[Math.floor(Math.random()*safe.length)];
      // ALWAYS air coin — between 55 and 85 above ground
      var airH=55+Math.floor(Math.random()*30);
      coins.push({lane:cl,x:LANES[cl],y:GY-airH,taken:false,age:0});
    }
  }

  // Move obstacles + collision
  for(var i=obstacles.length-1;i>=0;i--){
    var o=obstacles[i];o.x-=speed*dt;o.animF++;
    if(o.x<-100){obstacles.splice(i,1);continue;}
    if(Math.abs(o.x-bkX)<(o.w/2+14)&&bkY+18>o.y-o.h/2){endGame();return;}
  }

  // Move coins + collect
  for(var i=coins.length-1;i>=0;i--){
    var c=coins[i];c.age++;
    if(!c.taken)c.x-=speed*dt;
    else if(c.age>32){coins.splice(i,1);continue;}
    if(c.x<-50&&!c.taken){coins.splice(i,1);continue;}
    if(!c.taken&&Math.abs(c.x-bkX)<28&&Math.abs(c.y-bkY)<32){
      c.taken=true;score+=100;
      if(mode==='timer')timeLeft=Math.min(30,timeLeft+3);
      snd_coin();spawnParts(c.x,c.y,'#f0c040',9);
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function shuffArr(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}
function rndCarCol(){
  var cols=['#cc0000','#0044cc','#007700','#884400','#444444','#880088','#004488'];
  return cols[Math.floor(Math.random()*cols.length)];
}
function lighten(hex,a){
  var r=Math.min(255,parseInt(hex.slice(1,3),16)+a);
  var g=Math.min(255,parseInt(hex.slice(3,5),16)+a);
  var b=Math.min(255,parseInt(hex.slice(5,7),16)+a);
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(b<16?'0':'')+b.toString(16);
}

// ═══════════════════════════════════
//  DRAW
// ═══════════════════════════════════
function draw(){
  ctx.clearRect(0,0,CW,CH);
  if(STATE==='MENU')drawMenu();
  else if(STATE==='SELECT_MODE')drawSelectMode();
  else if(STATE==='SELECT_VEHICLE')drawSelectVehicle();
  else{drawGame();if(STATE==='DEAD')drawOverlay();}
}

// ─────────────────────────
//  MENU
// ─────────────────────────
function drawMenu(){
  drawCityBg(0,0);
  drawRoad(0,0);
  if(vehicle==='sportbike')drawSportBike(ctx,CW/2,HY+80,1.1,Date.now()/200);
  else drawBike(ctx,CW/2,HY+80,1.1,Date.now()/280);

  // Title
  ctx.save();
  ctx.font='bold 86px Arial Black';ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillText('MOTORUSH',CW/2+3,102);
  ctx.fillStyle='#060018';ctx.fillText('MOTORUSH',CW/2,99);
  ctx.strokeStyle='#f0c040';ctx.lineWidth=5;ctx.lineJoin='round';ctx.strokeText('MOTORUSH',CW/2,99);
  ctx.strokeStyle='#ff8800';ctx.lineWidth=2;ctx.strokeText('MOTORUSH',CW/2,99);
  ctx.restore();
  ctx.fillStyle='#ff8844';ctx.font='bold 13px Arial';ctx.textAlign='center';
  ctx.fillText('O F F L I N E   B I K E   R A C I N G',CW/2,120);
  ctx.fillStyle='#445566';ctx.font='11px Arial';
  ctx.fillText('Zone 1: City Night  →  Zone 2: Sahara Desert (score '+ZONE_SWITCH+')',CW/2,140);

  // Highscores panel
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(CW/2-180,155,360,54);
  ctx.strokeStyle='#f0c04033';ctx.lineWidth=1;ctx.strokeRect(CW/2-180,155,360,54);
  ctx.fillStyle='#f0c040';ctx.font='bold 12px Arial';ctx.textAlign='center';
  ctx.fillText('🏆  HIGHSCORES',CW/2,173);
  ctx.fillStyle='#aaa';ctx.font='11px Arial';ctx.textAlign='left';
  ctx.fillText('Endless:',CW/2-170,193);
  ctx.fillStyle='#f0c040';ctx.font='bold 13px Arial';ctx.fillText(hs.endless,CW/2-105,193);
  ctx.fillStyle='#aaa';ctx.font='11px Arial';ctx.fillText('Timer:',CW/2+20,193);
  ctx.fillStyle='#ff8844';ctx.font='bold 13px Arial';ctx.fillText(hs.timer,CW/2+70,193);

  // Big PLAY button
  var pg=ctx.createLinearGradient(CW/2-100,285,CW/2+100,345);
  pg.addColorStop(0,'#f0c040');pg.addColorStop(1,'#cc8800');
  ctx.fillStyle=pg;ctx.fillRect(CW/2-100,285,200,60);
  ctx.strokeStyle='#ffe080';ctx.lineWidth=2;ctx.strokeRect(CW/2-100,285,200,60);
  ctx.fillStyle='#000';ctx.font='bold 28px Arial Black';ctx.textAlign='center';
  ctx.fillText('▶  PLAY',CW/2,326);

  // Reset HS
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(CW/2-88,358,176,30);
  ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.strokeRect(CW/2-88,358,176,30);
  ctx.fillStyle='#444';ctx.font='11px Arial';ctx.textAlign='center';
  ctx.fillText('↺  Reset Highscores',CW/2,378);

  ctx.fillStyle='#2a2a2a';ctx.font='11px Arial';
  ctx.fillText('← → / A D = lane    SPACE / ↑ = jump    tap on mobile',CW/2,410);
}

function drawCard(x,y,w,h,col,title,sub,hs2){
  var gr=ctx.createLinearGradient(x,y,x,y+h);
  gr.addColorStop(0,col+'38');gr.addColorStop(1,col+'0a');
  ctx.fillStyle=gr;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);
  ctx.strokeStyle=col+'66';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x+2,y+2);ctx.lineTo(x+w-2,y+2);ctx.stroke();
  ctx.fillStyle=col;ctx.font='bold 21px Arial Black';ctx.textAlign='center';
  ctx.fillText(title,x+w/2,y+27);
  ctx.fillStyle='#999';ctx.font='11px Arial';ctx.fillText(sub,x+w/2,y+44);
  ctx.fillStyle=col;ctx.font='bold 12px Arial';ctx.fillText(hs2,x+w/2,y+62);
}

// ─────────────────────────
//  SELECT MODE SCREEN
// ─────────────────────────
function drawSelectMode(){
  drawCityBg(0,0);drawRoad(0,0);
  // Back button
  drawBtn(10,10,80,30,'#222','#888','◀ Back');
  // Title
  ctx.fillStyle='#fff';ctx.font='bold 36px Arial Black';ctx.textAlign='center';
  ctx.fillText('SELECT MODE',CW/2,80);
  ctx.fillStyle='#666';ctx.font='13px Arial';
  ctx.fillText('How do you want to play?',CW/2,105);

  // Endless card — bigger, clickable
  drawBigCard(60,155,220,160,'#f0c040','♾  ENDLESS',
    'Ride as far as you can','Dodge obstacles!','No time limit',hs.endless);
  // Timer card
  drawBigCard(360,155,220,160,'#ff4520','⏱  TIMER',
    '30 seconds on the clock','Collect coins for +3s','Beat the clock!',hs.timer);

  ctx.fillStyle='#333';ctx.font='12px Arial';ctx.textAlign='center';
  ctx.fillText('Tap a mode to continue to vehicle select',CW/2,405);
}

// ─────────────────────────
//  SELECT VEHICLE SCREEN  (3 vehicles)
// ─────────────────────────
function drawSelectVehicle(){
  drawCityBg(0,0);drawRoad(0,0);
  drawBtn(10,10,80,30,'#222','#888','◀ Back');
  ctx.fillStyle='#fff';ctx.font='bold 34px Arial Black';ctx.textAlign='center';
  ctx.fillText('SELECT VEHICLE',CW/2,62);
  ctx.fillStyle=mode==='endless'?'#f0c040':'#ff4520';
  ctx.font='bold 12px Arial';
  ctx.fillText('Mode: '+(mode==='endless'?'ENDLESS':'TIMER 30s'),CW/2,80);

  // Card positions for 3 vehicles
  var cards=[
    {x:18, col:'#f0c040', label:'BIKE',       sub1:'Fast & agile',      sub2:'CAN jump over obstacles', key:'bike'},
    {x:228,col:'#ff44cc', label:'SPORT BIKE', sub1:'Ultra fast',         sub2:'CAN jump — extra speed',  key:'sportbike'},

// ─────────────────────────
//  GAME DRAW
// ─────────────────────────
function drawGame(){
  // Base bg — blend between zones
  if(zone===0||zoneAlpha>0){
    drawCityBg(frameN,1-zoneAlpha);
  }
  if(zone===1||zoneAlpha>0){
    drawDesertBg(frameN,zone===1?1:zoneAlpha);
  }

  drawRoad(roadX,zone===1?1-zoneAlpha:0);

  // Coins
  coins.forEach(function(c){
    if(c.taken){
      ctx.globalAlpha=Math.max(0,1-c.age/24);
      ctx.fillStyle='#f0c040';ctx.font='bold 15px Arial Black';ctx.textAlign='center';
      ctx.fillText('+100',c.x,c.y-15-(c.age*0.8));
      ctx.globalAlpha=1;
    } else {
      var bob=Math.sin(c.age*0.12)*5;
      ctx.save();
      ctx.shadowColor='#f0c040';ctx.shadowBlur=22;
      ctx.strokeStyle='#f0c040';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(c.x,c.y+bob,15,0,Math.PI*2);ctx.stroke();
      var cg=ctx.createRadialGradient(c.x-4,c.y+bob-4,2,c.x,c.y+bob,13);
      cg.addColorStop(0,'#ffe060');cg.addColorStop(1,'#bb7700');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y+bob,13,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#6a3800';ctx.font='bold 13px Arial';ctx.textAlign='center';
      ctx.fillText('$',c.x,c.y+bob+5);
      ctx.restore();
    }
  });

  // Obstacles
  obstacles.forEach(function(o){drawObstacle(o);});

  // Particles
  particles.forEach(function(p){
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/p.ml),0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;

  // Player vehicle
  var bob=bkGnd?Math.sin(frameN*0.22)*1.5:0;
  if(vehicle==='bike'){
    drawBike(ctx,bkX,bkY+bob,1,bkRot);
  } else if(vehicle==='sportbike'){
    drawSportBike(ctx,bkX,bkY+bob,1,bkRot);
  } else {
    ctx.save();ctx.translate(bkX,GY+14+bob);ctx.scale(1.15,1.15);
    drawPlayerCar(ctx,bkRot);ctx.restore();
  }

  // Speed lines
  if(speed>7){
    ctx.globalAlpha=Math.min(0.3,(speed-7)*0.05);
    ctx.strokeStyle='#ccccff';ctx.lineWidth=1;
    for(var i=0;i<10;i++){
      var sy=25+Math.random()*(HY-25),sx=Math.random()*CW,ln=25+Math.random()*55;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-ln,sy);ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  drawHUD();

  // Zone transition message
  if(zoneMsgTimer>0){
    var a=Math.min(1,zoneMsgTimer/30)*Math.min(1,(zoneMsgTimer/150)*3);
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(CW/2-200,CH/2-30,400,55);
    ctx.strokeStyle='#f0c040';ctx.lineWidth=2;ctx.strokeRect(CW/2-200,CH/2-30,400,55);
    ctx.fillStyle='#f0c040';ctx.font='bold 24px Arial Black';ctx.textAlign='center';
    ctx.fillText(zoneMsg,CW/2,CH/2+10);
    ctx.globalAlpha=1;
  }
}

// ═══════════════════════════════════
//  ZONE BACKGROUNDS
// ═══════════════════════════════════
function drawCityBg(f,alpha){
  ctx.globalAlpha=alpha!==undefined?alpha:1;
  // Sky
  var sky=ctx.createLinearGradient(0,0,0,HY);
  sky.addColorStop(0,'#020208');sky.addColorStop(0.55,'#08051e');sky.addColorStop(1,'#180832');
  ctx.fillStyle=sky;ctx.fillRect(0,0,CW,HY);
  // Stars
  STARS.forEach(function(s){
    s.tw+=0.025;
    ctx.globalAlpha=(alpha!==undefined?alpha:1)*(0.35+0.55*Math.abs(Math.sin(s.tw)));
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=alpha!==undefined?alpha:1;
  // Moon
  drawMoon(CW-72,44,22,alpha);
  // Buildings
  BLDS.forEach(function(b){
    var by=HY-1;
    var bg2=ctx.createLinearGradient(b.x,by-b.h,b.x+b.w,by);
    bg2.addColorStop(0,b.col);bg2.addColorStop(1,'#050510');
    ctx.fillStyle=bg2;ctx.fillRect(b.x,by-b.h,b.w,b.h);
    ctx.strokeStyle='#0a1222';ctx.lineWidth=1;ctx.strokeRect(b.x,by-b.h,b.w,b.h);
    for(var wi=0;wi<b.wc;wi++){
      var wx=b.x+5+(wi%3)*9,wy=by-b.h+7+Math.floor(wi/3)*13;
      var lit=(wi+Math.floor(f/100))%3!==0;
      ctx.fillStyle=lit?'rgba(255,220,90,0.7)':'rgba(10,20,50,0.5)';
      ctx.fillRect(wx,wy,6,8);
    }
    if(b.h>80){
      ctx.strokeStyle='#223';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(b.x+b.w/2,by-b.h);ctx.lineTo(b.x+b.w/2,by-b.h-12);ctx.stroke();
      ctx.fillStyle=Math.floor(f/45)%2===0?'#ff2200':'#550000';
      ctx.beginPath();ctx.arc(b.x+b.w/2,by-b.h-12,2.5,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.globalAlpha=1;
}

function drawDesertBg(f,alpha){
  ctx.globalAlpha=alpha;
  // Hot daytime sky
  var sky=ctx.createLinearGradient(0,0,0,HY);
  sky.addColorStop(0,'#1a6aaa');sky.addColorStop(0.5,'#e87020');sky.addColorStop(1,'#f0a020');
  ctx.fillStyle=sky;ctx.fillRect(0,0,CW,HY);
  // Sun
  ctx.fillStyle='#fff8c0';ctx.shadowColor='#ffdd00';ctx.shadowBlur=30;
  ctx.beginPath();ctx.arc(520,55,28,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Sun rays
  ctx.strokeStyle='rgba(255,240,160,0.25)';ctx.lineWidth=2;
  for(var ri=0;ri<8;ri++){
    var ra=ri*Math.PI/4;
    ctx.beginPath();ctx.moveTo(520+Math.cos(ra)*32,55+Math.sin(ra)*32);
    ctx.lineTo(520+Math.cos(ra)*50,55+Math.sin(ra)*50);ctx.stroke();
  }
  // Heat haze horizon
  var haze=ctx.createLinearGradient(0,HY-18,0,HY+12);
  haze.addColorStop(0,'rgba(255,180,50,0)');haze.addColorStop(0.5,'rgba(255,200,80,0.35)');haze.addColorStop(1,'rgba(255,180,50,0)');
  ctx.fillStyle=haze;ctx.fillRect(0,HY-18,CW,30);
  // Sand dunes in background
  ctx.fillStyle='#c87020';
  ctx.beginPath();ctx.moveTo(0,HY);
  for(var di=0;di<8;di++){
    var dx=di*(CW/7);var dy=HY-15-Math.sin(di*1.3)*18;
    ctx.quadraticCurveTo(dx+CW/14,dy-12,dx+CW/7,HY);
  }
  ctx.lineTo(CW,HY);ctx.lineTo(0,HY);ctx.closePath();ctx.fill();
  // Foreground sand dunes
  ctx.fillStyle='#d88030';
  ctx.beginPath();ctx.moveTo(0,HY+5);
  for(var di=0;di<6;di++){
    var dx2=di*(CW/5)+((f*speed*0.06)%(CW/5));
    ctx.quadraticCurveTo(dx2+CW/10,HY-8,dx2+CW/5,HY+5);
  }
  ctx.lineTo(CW,HY+5);ctx.lineTo(0,HY+5);ctx.closePath();ctx.fill();
  // Cacti/rocks in distance
  CACTI.forEach(function(c){
    ctx.globalAlpha=alpha*0.8;
    if(c.type==='cactus'){
      ctx.fillStyle='#3a7a30';
      ctx.fillRect(c.x-4,HY-c.h,8,c.h);
      ctx.fillRect(c.x-14,HY-c.h*0.65,10,6);
      ctx.fillRect(c.x+4,HY-c.h*0.45,10,6);
    } else {
      ctx.fillStyle='#aa7040';
      ctx.beginPath();ctx.ellipse(c.x,HY-c.h/2,c.h*0.7,c.h/2,0,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.globalAlpha=1;
}

function drawMoon(x,y,r,alpha){
  ctx.save();ctx.globalAlpha=alpha!==undefined?alpha:1;
  ctx.fillStyle='#f5e8a0';ctx.shadowColor='#f8e89055';ctx.shadowBlur=22;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(160,140,60,0.3)';
  ctx.beginPath();ctx.arc(x+r*0.3,y-r*0.2,r*0.22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#060018';
  ctx.beginPath();ctx.arc(x+r*0.42,y-r*0.1,r*0.78,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawRoad(rx,desertBlend){
  var db=desertBlend||0;
  // Road color blends from dark city to sandy desert
  var roadCol=db>0?lerpCol('#111120','#c08838',db):'#111120';
  var rg=ctx.createLinearGradient(0,HY,0,CH);
  rg.addColorStop(0,db>0?lerpCol('#0d0d20','#a07030',db):'#0d0d20');
  rg.addColorStop(1,db>0?lerpCol('#090915','#8a6020',db):'#090915');
  ctx.fillStyle=rg;ctx.fillRect(0,HY,CW,CH-HY);

  // Road texture
  ctx.strokeStyle=db>0?'rgba(160,120,50,0.3)':'#161628';ctx.lineWidth=1;
  for(var ri=0;ri<8;ri++){ctx.beginPath();ctx.moveTo(0,HY+8+ri*11);ctx.lineTo(CW,HY+8+ri*11);ctx.stroke();}

  // Horizon glow
  var hcol=db>0?'rgba(255,160,30,0.4)':'rgba(120,40,220,0.4)';
  var hg=ctx.createLinearGradient(0,HY-10,0,HY+14);
  hg.addColorStop(0,'transparent');hg.addColorStop(0.5,hcol);hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg;ctx.fillRect(0,HY-10,CW,24);

  // Horizon line
  ctx.strokeStyle=db>0?'#ffaa30':'#f0c040';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,HY);ctx.lineTo(CW,HY);ctx.stroke();

  // Road edges
  var ecol=db>0?'#ffaa3055':'#f0c04066';
  ctx.strokeStyle=ecol;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(22,HY);ctx.lineTo(22,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CW-22,HY);ctx.lineTo(CW-22,CH);ctx.stroke();

  // Lane dashes
  ctx.setLineDash([28,22]);ctx.lineDashOffset=rx;
  ctx.strokeStyle=db>0?'rgba(255,180,50,0.4)':'rgba(240,192,64,0.4)';ctx.lineWidth=2.5;
  [215,425].forEach(function(lx){ctx.beginPath();ctx.moveTo(lx,HY);ctx.lineTo(lx,CH);ctx.stroke();});
  ctx.setLineDash([]);

  // Road sheen
  var sh=ctx.createLinearGradient(0,HY,0,HY+50);
  var sc=db>0?'rgba(255,160,50,0.1)':'rgba(100,60,255,0.1)';
  sh.addColorStop(0,sc);sh.addColorStop(1,'transparent');
  ctx.fillStyle=sh;ctx.fillRect(22,HY,CW-44,50);
}

function lerpCol(a,b,t){
  var ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab2=parseInt(a.slice(5,7),16);
  var br=parseInt(b.slice(1,3),16),bg2=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  var r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg2-ag)*t),bv=Math.round(ab2+(bb-ab2)*t);
  return '#'+(r<16?'0':'')+r.toString(16)+(g<16?'0':'')+g.toString(16)+(bv<16?'0':'')+bv.toString(16);
}

// ═══════════════════════════════════
//  DRAW BIKE (player)
// ═══════════════════════════════════
function drawBike(c,x,y,sc,wr){
  c.save();c.translate(x,y);c.scale(sc,sc);

  // Shadow
  c.fillStyle='rgba(0,0,0,0.28)';
  c.beginPath();c.ellipse(0,46,48,9,0,0,Math.PI*2);c.fill();

  // Exhaust
  c.strokeStyle='#555';c.lineWidth=5;c.lineCap='round';
  c.beginPath();c.moveTo(-15,14);c.quadraticCurveTo(-38,22,-58,20);c.stroke();
  c.strokeStyle='#333';c.lineWidth=2;
  c.beginPath();c.moveTo(-58,20);c.quadraticCurveTo(-66,18,-62,11);c.stroke();
  if(Math.floor(Date.now()/220)%2===0){
    c.globalAlpha=0.14;c.fillStyle='#888';
    c.beginPath();c.arc(-64,9,5,0,Math.PI*2);c.fill();c.globalAlpha=1;
  }

  // Wheels
  drawWheel(c,-30,32,22,wr);
  drawWheel(c,32,32,22,wr);

  // Frame
  c.strokeStyle='#cc2200';c.lineWidth=7;c.lineCap='round';
  c.beginPath();c.moveTo(-5,-14);c.lineTo(-18,20);c.stroke();
  c.beginPath();c.moveTo(-5,-14);c.lineTo(-1,20);c.stroke();
  c.strokeStyle='#ffaa00';c.lineWidth=5;

function drawWheel(c,wx,wy,r,rot){
  c.save();c.translate(wx,wy);
  var tg=c.createRadialGradient(0,0,r*0.65,0,0,r);
  tg.addColorStop(0,'#2a2a2a');tg.addColorStop(1,'#000');
  c.fillStyle=tg;c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fill();
  c.strokeStyle='#3a3a3a';c.lineWidth=5;c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.stroke();
  var rg=c.createRadialGradient(-r*0.2,-r*0.2,1,0,0,r*0.62);
  rg.addColorStop(0,'#ccc');rg.addColorStop(1,'#555');
  c.strokeStyle=rg;c.lineWidth=4;c.beginPath();c.arc(0,0,r*0.62,0,Math.PI*2);c.stroke();
  c.fillStyle='#ddd';c.beginPath();c.arc(0,0,5,0,Math.PI*2);c.fill();
  c.save();c.rotate(rot);
  c.strokeStyle='#f0c040';c.lineWidth=2;
  for(var i=0;i<6;i++){c.rotate(Math.PI/3);c.beginPath();c.moveTo(0,4);c.lineTo(0,r*0.56);c.stroke();}
  c.restore();
  c.restore();
}

// ═══════════════════════════════════
//  OBSTACLES: CAR + ENEMY BIKE
// ═══════════════════════════════════
function drawObstacle(o){
  ctx.save();ctx.translate(o.x,o.y);
  if(o.type==='cone') drawCone(ctx);
  else if(o.type==='rock') drawRock(ctx);
  else if(o.type==='car') drawCar(ctx,o.col,o.animF);
  else if(o.type==='ebike') drawEnemyBike(ctx,o.animF);
  ctx.restore();
}

function drawCone(c){
  // Shadow
  c.fillStyle='rgba(0,0,0,0.3)';
  c.beginPath();c.ellipse(0,12,18,5,0,0,Math.PI*2);c.fill();
  // Cone body gradient
  var cg=c.createLinearGradient(-18,-36,18,12);
  cg.addColorStop(0,'#ff8800');cg.addColorStop(1,'#cc4400');
  c.fillStyle=cg;
  c.beginPath();c.moveTo(0,-36);c.lineTo(18,10);c.lineTo(-18,10);c.closePath();c.fill();
  c.strokeStyle='#ff6600';c.lineWidth=1.5;c.stroke();
  // White stripe
  c.fillStyle='#fff';c.fillRect(-18,-4,36,7);
  // Base
  c.fillStyle='#ff6600';c.beginPath();c.ellipse(0,10,20,6,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#cc4400';c.lineWidth=1;c.stroke();
  // Shine
  c.fillStyle='rgba(255,220,120,0.28)';
  c.beginPath();c.moveTo(0,-36);c.lineTo(5,-10);c.lineTo(-5,-10);c.closePath();c.fill();
}

function drawRock(c){
  // Shadow
  c.fillStyle='rgba(0,0,0,0.35)';
  c.beginPath();c.ellipse(0,18,26,7,0,0,Math.PI*2);c.fill();
  // Rock body
  var rg=c.createLinearGradient(-26,-22,26,18);
  rg.addColorStop(0,'#7788aa');rg.addColorStop(1,'#334455');
  c.fillStyle=rg;
  c.beginPath();
  c.moveTo(-22,16);c.lineTo(-26,-6);c.lineTo(-12,-22);
  c.lineTo(10,-24);c.lineTo(26,-12);c.lineTo(24,16);
  c.closePath();c.fill();
  c.strokeStyle='#99aacc';c.lineWidth=2;c.stroke();
  // Top highlight
  c.fillStyle='rgba(180,200,230,0.38)';
  c.beginPath();c.moveTo(-12,-22);c.lineTo(10,-24);c.lineTo(8,-8);c.lineTo(-6,-6);c.closePath();c.fill();
  // Bottom shadow
  c.fillStyle='rgba(20,30,50,0.42)';
  c.beginPath();c.moveTo(-22,16);c.lineTo(-5,2);c.lineTo(12,6);c.lineTo(24,16);c.closePath();c.fill();
}

function drawCar(c,col,af){
  // Shadow
  c.fillStyle='rgba(0,0,0,0.35)';
  c.beginPath();c.ellipse(0,16,42,8,0,0,Math.PI*2);c.fill();
  // Body
  var cg=c.createLinearGradient(-42,-22,42,16);
  cg.addColorStop(0,lighten(col,45));cg.addColorStop(0.4,col);cg.addColorStop(1,lighten(col,-30));
  c.fillStyle=cg;
  c.beginPath();c.moveTo(-42,14);c.lineTo(-42,-6);c.lineTo(-28,-22);c.lineTo(24,-22);c.lineTo(42,-6);c.lineTo(42,14);c.closePath();c.fill();
  c.strokeStyle=lighten(col,30);c.lineWidth=1.5;c.stroke();
  // Roof
  var rfg=c.createLinearGradient(-26,-6,28,-20);
  rfg.addColorStop(0,lighten(col,20));rfg.addColorStop(1,lighten(col,-10));
  c.fillStyle=rfg;
  c.beginPath();c.moveTo(-26,-6);c.lineTo(-18,-20);c.lineTo(20,-20);c.lineTo(28,-6);c.closePath();c.fill();
  // Windshield
  c.fillStyle='rgba(180,230,255,0.55)';
  c.beginPath();c.moveTo(-16,-6);c.lineTo(-11,-18);c.lineTo(14,-18);c.lineTo(20,-6);c.closePath();c.fill();
  c.strokeStyle='rgba(120,200,255,0.4)';c.lineWidth=1;c.stroke();
  // Rear window
  c.fillStyle='rgba(160,210,240,0.4)';
  c.beginPath();c.moveTo(-24,-6);c.lineTo(-19,-18);c.lineTo(-11,-18);c.lineTo(-14,-6);c.closePath();c.fill();
  // Headlights
  c.fillStyle='#ffffbb';c.shadowColor='#ffff88';c.shadowBlur=12;
  c.beginPath();c.ellipse(39,-1,5,4,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(39,7,5,4,0,0,Math.PI*2);c.fill();c.shadowBlur=0;
  // Taillights
  c.fillStyle='#ff1100';c.shadowColor='#ff0000';c.shadowBlur=8;
  c.beginPath();c.ellipse(-39,-1,5,4,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(-39,7,5,4,0,0,Math.PI*2);c.fill();c.shadowBlur=0;
  // Wheels
  [-28,28].forEach(function(wx){
    c.fillStyle='#111';c.beginPath();c.arc(wx,14,8,0,Math.PI*2);c.fill();
    c.strokeStyle='#444';c.lineWidth=2;c.stroke();
    c.strokeStyle='#aaa';c.lineWidth=1.5;c.beginPath();c.arc(wx,14,5,0,Math.PI*2);c.stroke();
    // spinning hubcap
    c.save();c.translate(wx,14);c.rotate(af*0.15);
    c.strokeStyle='#ccc';c.lineWidth=1;
    for(var si=0;si<4;si++){c.rotate(Math.PI/2);c.beginPath();c.moveTo(0,1);c.lineTo(0,4);c.stroke();}
    c.restore();
  });
  // Door
  c.strokeStyle='rgba(0,0,0,0.25)';c.lineWidth=1;
  c.beginPath();c.moveTo(0,-20);c.lineTo(2,12);c.stroke();
  // Mirror
  c.fillStyle=col;c.beginPath();c.rect(40,-12,6,5);c.fill();
}

  c.strokeStyle='#333';c.lineWidth=2;c.stroke();
  c.fillStyle='rgba(255,60,0,0.5)';c.strokeStyle='#ff4400';c.lineWidth=1.5;
  c.beginPath();c.arc(-2,-33,16,Math.PI*1.04,Math.PI*1.55,false);c.lineTo(-2,-22);c.closePath();c.fill();c.stroke();

function drawSportBike(c,x,y,sc,wr){
  c.save();c.translate(x,y);c.scale(sc,sc);

  // Shadow
  c.fillStyle='rgba(0,0,0,0.25)';

  // Exhaust — low sport style
  c.strokeStyle='#888';c.lineWidth=4;c.lineCap='round';
  c.beginPath();c.moveTo(-10,18);c.quadraticCurveTo(-30,24,-48,22);c.stroke();
  c.strokeStyle='#555';c.lineWidth=2;
  c.beginPath();c.moveTo(-48,22);c.lineTo(-54,18);c.stroke();

  // Wheels
  drawWheel(c,-28,30,20,wr);
  drawWheel(c,30,30,20,wr);

  // Sport frame — lower & more aggressive
  c.strokeStyle='#cc00aa';c.lineWidth=7;c.lineCap='round';
  c.beginPath();c.moveTo(-2,-8);c.lineTo(-14,18);c.stroke();
  c.beginPath();c.moveTo(-2,-8);c.lineTo(2,18);c.stroke();
  c.strokeStyle='#ff44cc';c.lineWidth=5;
  c.beginPath();c.moveTo(-2,-8);c.lineTo(14,-18);c.stroke();
  c.beginPath();c.moveTo(14,-18);c.lineTo(30,30);c.stroke();
  c.strokeStyle='#aa0088';c.lineWidth=3;
  c.beginPath();c.moveTo(2,18);c.lineTo(-28,30);c.stroke();
  c.beginPath();c.moveTo(2,10);c.lineTo(-28,30);c.stroke();

  // Fairing (sport bike body cover) — aerodynamic
  var fg=c.createLinearGradient(-16,-20,20,14);
  fg.addColorStop(0,'#ff55dd');fg.addColorStop(0.5,'#cc00aa');fg.addColorStop(1,'#660055');
  c.fillStyle=fg;
  c.beginPath();c.moveTo(-14,-8);c.lineTo(-6,-20);c.lineTo(16,-22);c.lineTo(22,-8);
  c.lineTo(18,10);c.lineTo(-12,12);c.closePath();c.fill();
  c.strokeStyle='#ff88ee';c.lineWidth=1.5;c.stroke();
  // Fairing shine
  c.fillStyle='rgba(255,200,255,0.22)';
  c.beginPath();c.moveTo(-4,-18);c.lineTo(12,-20);c.lineTo(14,-10);c.lineTo(-2,-8);c.closePath();c.fill();

  // Fuel tank (integrated with fairing)
  var tg=c.createLinearGradient(-8,-16,12,-4);
  tg.addColorStop(0,'#ff44cc');tg.addColorStop(1,'#880066');
  c.fillStyle=tg;
  c.beginPath();c.moveTo(-6,-16);c.lineTo(12,-18);c.lineTo(14,-8);c.lineTo(-4,-6);c.closePath();c.fill();

  // Seat — low sporty
  c.fillStyle='#1a1a1a';
  c.beginPath();c.moveTo(-14,-22);c.lineTo(6,-24);c.lineTo(8,-16);c.lineTo(-16,-16);c.closePath();c.fill();
  c.strokeStyle='#333';c.lineWidth=1;c.stroke();

  // Clip-on handlebar
  c.strokeStyle='#ccc';c.lineWidth=3;c.lineCap='round';
  c.beginPath();c.moveTo(10,-14);c.lineTo(20,-12);c.stroke();
  c.beginPath();c.moveTo(20,-12);c.lineTo(22,-20);c.stroke();
  c.beginPath();c.moveTo(20,-12);c.lineTo(24,-6);c.stroke();
  c.strokeStyle='#111';c.lineWidth=6;
  c.beginPath();c.moveTo(21,-20);c.lineTo(26,-20);c.stroke();
  c.beginPath();c.moveTo(22,-6);c.lineTo(27,-6);c.stroke();

  // Headlight — sporty sharp
  c.fillStyle='#eeffff';c.shadowColor='#aaffff';c.shadowBlur=16;
  c.beginPath();c.moveTo(34,-8);c.lineTo(40,-4);c.lineTo(40,2);c.lineTo(34,4);c.closePath();c.fill();c.shadowBlur=0;
  // Beam
  c.fillStyle='rgba(200,255,255,0.07)';
  c.beginPath();c.moveTo(40,-4);c.lineTo(82,-16);c.lineTo(82,14);c.lineTo(40,2);c.closePath();c.fill();

  // Taillight
  c.fillStyle='#ff00aa';c.shadowColor='#ff00aa';c.shadowBlur=10;
  c.beginPath();c.ellipse(-42,20,5,4,0,0,Math.PI*2);c.fill();c.shadowBlur=0;

  // Rider — tucked in aero position
  c.fillStyle='#0a0a0a';
  c.beginPath();c.ellipse(-2,20,8,5,0.5,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(8,18,8,5,-0.5,0,Math.PI*2);c.fill();
  c.strokeStyle='#2a1a4a';c.lineWidth=9;c.lineCap='round';
  c.beginPath();c.moveTo(0,-2);c.lineTo(-2,20);c.stroke();
  c.beginPath();c.moveTo(4,-2);c.lineTo(8,18);c.stroke();
  // Jacket — tucked forward
  var jg=c.createLinearGradient(-10,-4,16,-22);
  jg.addColorStop(0,'#cc00aa');jg.addColorStop(1,'#660077');
  c.fillStyle=jg;
  c.beginPath();c.moveTo(-10,-4);c.lineTo(14,-8);c.lineTo(18,-22);c.lineTo(8,-26);c.lineTo(-2,-20);c.lineTo(-12,-18);c.closePath();c.fill();
  c.strokeStyle='#ee22cc';c.lineWidth=1.5;c.stroke();
  // White stripes on jacket
  c.strokeStyle='rgba(255,255,255,0.35)';c.lineWidth=2;
  c.beginPath();c.moveTo(-8,-16);c.lineTo(12,-20);c.stroke();
  // Arm stretched forward
  c.strokeStyle='#aa0088';c.lineWidth=8;c.lineCap='round';
  c.beginPath();c.moveTo(6,-18);c.quadraticCurveTo(16,-16,24,-10);c.stroke();
  c.fillStyle='#0a0a0a';c.beginPath();c.arc(24,-10,4,0,Math.PI*2);c.fill();
  // Helmet — aerodynamic teardrop
  var hg=c.createRadialGradient(-2,-36,2,2,-32,14);
  hg.addColorStop(0,'#ff88ee');hg.addColorStop(1,'#880066');
  c.fillStyle=hg;
  c.beginPath();c.arc(2,-32,14,Math.PI*0.08,Math.PI*1.08,true);c.closePath();c.fill();
  c.strokeStyle='#ff44cc';c.lineWidth=2;c.stroke();
  // Visor — tinted dark
  c.fillStyle='rgba(0,0,0,0.55)';c.strokeStyle='#cc44aa';c.lineWidth=1.5;
  c.beginPath();c.arc(2,-32,14,Math.PI*0.42,Math.PI*0.92,false);c.lineTo(2,-22);c.closePath();c.fill();c.stroke();
  // Helmet racing stripe
  c.strokeStyle='rgba(255,255,255,0.6)';c.lineWidth=2;
  c.beginPath();c.arc(2,-32,14,Math.PI*0.08,Math.PI*0.42,false);c.stroke();

  c.restore();
}
